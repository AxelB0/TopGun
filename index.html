<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Extract Options Data</title>
</head>
<body>

<h2>Paste Raw Data</h2>
<label for="rawInput"></label><textarea id="rawInput" style="width:100%;height:300px;"></textarea>
<br><br>
<button onclick="extractJSON()">Add to JSON</button>
<button onclick="addWeeksToData()">Calculate Weeks</button>
<button onclick="copyJSON()">Copy JSON</button>
<a href="index2.html">
    <button type="button">Next page</button>
</a>
<div id="copyNotice">Copied to clipboard</div>

<h2>Output JSON:</h2>
<pre id="output">[]</pre>
<style>
    #copyNotice {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #333;
        color: white;
        padding: 10px 16px;
        border-radius: 6px;
        opacity: 0;
        transition: opacity 0.4s;
        font-family: sans-serif;
    }

    #copyNotice.show {
        opacity: 1;
    }
</style>

<script>

    // persistent cumulative results and last year
    let cumulativeResults = [];
    let persistentYear = ""; // <-- stores the last detected year across clicks

    function extractJSON() {
        const raw = document.getElementById('rawInput').value;
        const lines = raw.split('\n');

        const results = [];

        for (let line of lines) {
            line = line.trim();
            if (!line) continue;

            // Detect full month with day and year, e.g., "January 15, 2027"
            const yearMatch = line.match(/^(January|February|March|April|May|June|July|August|September|October|November|December)\s\d{1,2},\s(\d{4})$/);
            if (yearMatch) {
                persistentYear = yearMatch[2]; // update persistent year
                continue;
            }

            // Match rows starting with 3-letter month abbreviation
            const rowMatch = line.match(/^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{1,2})\s+([0-9.]+|--)\s+[^\s]+\s+([0-9.]+|--)\s+([0-9.]+|--)\s+[^\s]+\s+[^\s]+\s+([0-9.]+|--)/);
            if (rowMatch) {
                const date = `${rowMatch[1]} ${rowMatch[2]} ${persistentYear}`;
                const last = rowMatch[3] === '--' ? 0 : parseFloat(rowMatch[3]);
                const bid = rowMatch[4] === '--' ? 0 : parseFloat(rowMatch[4]);
                const ask = rowMatch[5] === '--' ? 0 : parseFloat(rowMatch[5]);
                const strike = rowMatch[6] === '--' ? 0 : parseFloat(rowMatch[6]);
                const avg = +( (bid + ask) / 2 ).toFixed(2);

                results.push({
                    date,
                    last,
                    bid,
                    ask,
                    avg,
                    strike
                });
            }
        }

        cumulativeResults = cumulativeResults.concat(results);
        document.getElementById('output').textContent =
            JSON.stringify(cumulativeResults, null, 2);
    }

    function addWeeksToData() {

        const now = new Date();

        cumulativeResults = cumulativeResults.map(row => {

            const expiration = new Date(row.date);

            const diffMs = expiration - now;
            const weeks = diffMs / (1000 * 60 * 60 * 24 * 7);

            return {
                ...row,
                weeks: Math.floor(weeks)
            };

        });

        document.getElementById("output").textContent =
            JSON.stringify(cumulativeResults, null, 2);
    }

    function copyJSON() {

        const text = document.getElementById("output").textContent;

        navigator.clipboard.writeText(text);

        const notice = document.getElementById("copyNotice");
        notice.classList.add("show");

        setTimeout(() => {
            notice.classList.remove("show");
        }, 2000);
    }
</script>

</body>
</html>
